name: Static smoke check

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  static-files:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate web manifest JSON
        run: python -m json.tool manifest.webmanifest > /tmp/pointify-manifest.json

      - name: Confirm core app files
        run: |
          test -s index.html
          test -s styles.css
          test -s app.js
          test -s sw.js
          test -s assets/icon-192.png
          test -s assets/icon-512.png

      - name: Check service worker registration reference
        run: grep -q "serviceWorker" app.js
